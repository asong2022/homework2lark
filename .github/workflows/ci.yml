name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: astral-sh/setup-uv@v6
        with:
          version: latest
          enable-cache: true

      - name: Install dependencies
        run: |
          npm ci
          uv sync --directory apps/api --group dev

      - name: Backend checks
        run: |
          uv run --directory apps/api pytest
          uv run --directory apps/api ruff check .
          uv run --directory apps/api ruff format --check .
          uv run --directory apps/api mypy src

      - name: Skill checks
        run: |
          uv run --directory apps/api --with python-docx python -m unittest discover -s ../../.agents/skills/shi-homework2lark/tests -p 'test_*.py'
          uv run --directory apps/api ruff check ../../.agents/skills/shi-homework2lark/scripts ../../.agents/skills/shi-homework2lark/tests
          uv run --directory apps/api ruff format --check ../../.agents/skills/shi-homework2lark/scripts ../../.agents/skills/shi-homework2lark/tests

      - name: Web checks
        run: |
          npm run lint:web
          npm run typecheck:web
          npm run test:web
          npm run build:web
