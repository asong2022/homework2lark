<style>

lter:drop-shadow(0 0 5px rgba(47,155,114,.35))}}.shade-candidate{animation:shadePulse 1.15s ease-in-out infinite;stroke:#2f9b72!important}.labels-hidden text.object{display:none}.points-hidden circle.object[data-kind="点"],.points-hidden circle.object[data-kind="中点"]{display:none}

            const dist = Math.hypot(localGp.x - p.x, localGp.y - p.y);

}
function showSnap(p) {

    if (p) layer.innerHTML = `<circle cx="${p.x}" cy="${p.y}" r="${12/scale}" fill="none" stroke="#2f9b72" stroke-width="${2/scale}"/><circle cx="${p.x}" cy="${p.y}" r="${4/scale}" fill="#2f9b72"/>`;

}

    if (!layer) {

}

        return;
    }
    if (!anchor) { layer.innerHTML = ''; return; }

    let shape = '';
    if (tool === 'segment' || tool === 'line') shape = `<line class="preview" x1="${anchor.x}" y1="${anchor.y}" x2="${p.x}" y2="${p.y}" stroke-width="${3/scale}"/>`;
    if (tool === 'circle') shape = `<circle class="preview" cx="${anchor.x}" cy="${anchor.y}" r="${r}" stroke-width="${3/scale}"/>`;
    if (tool === 'rectangle') shape = `<rect class="preview" x="${x}" y="${y}" width="${w}" height="${h}" stroke-width="${3/scale}"/>`;
    if (tool === 'ellipse' || tool === 'shade') shape = `<ellipse class="preview" cx="${cx}" cy="${cy}" rx="${w / 2}" ry="${h / 2}" stroke-width="${3/scale}"/>`;
    if (tool === 'semicircle') { const sx = 2 * anchor.x - p.x, sy = 2 * anchor.y - p.y; shape = `<path class="preview" d="M ${p.x} ${p.y} A ${r} ${r} 0 0 0 ${sx} ${sy} Z" stroke-width="${3/scale}" fill="none"/>`; }

    if (tool === 'rightangle') { const mx = anchor.x + Math.sign(p.x - anchor.x) * 15, my = anchor.y + Math.sign(p.y - anchor.y) * 15; shape = `<path class="preview" d="M ${p.x} ${anchor.y} L ${anchor.x} ${anchor.y} L ${anchor.x} ${p.y} M ${mx} ${anchor.y} L ${mx} ${my} L ${anchor.x} ${my}" stroke-width="${3/scale}" fill="none"/>`; }
    if (tool === 'angle') { const sx = Math.sign(p.x - anchor.x) || 1; const hx = anchor.x + sx * r; shape = `<path class="preview" d="${drawAnglePath(anchor.x, anchor.y, hx, anchor.y, p.x, p.y)}" stroke-width="${3/scale}" fill="none"/>`; }

    }

    layer.innerHTML = shape + `<circle class="preview-point" cx="${anchor.x}" cy="${anchor.y}" r="${3/scale}"/>`;
}
function eraseAt(e) {
    const p = point(e);
    previewLayer().innerHTML = `<circle cx="${p.x}" cy="${p.y}" r="${eraserSize/scale}" fill="rgba(220,53,69,0.2)" stroke="#dc3545" stroke-width="${2/scale}" pointer-events="none"/>`;
    const r = eraserSize;
    const pts = [ {x: e.clientX, y: e.clientY}, {x: e.clientX - r/2, y: e.clientY}, {x: e.clientX + r/2, y: e.clientY}, {x: e.clientX, y: e.clientY - r/2}, {x: e.clientX, y: e.clientY + r/2} ];
    pts.forEach(pt => {
        document.elementsFromPoint(pt.x, pt.y).forEach(el => {

}
function point(e) {

}
function rawScreenPoint(e) { return { x: e.clientX, y: e.clientY }; }

function hex(v, f = '#000000') { return /^#[0-9a-f]{6}$/i.test(v || '') ? v : f; }

function handleLayer() { let layer = $('handleLayer'); if (!layer) { layer = document.createElementNS('http://www.w3.org/2000/svg', 'g'); layer.id = 'handleLayer'; $('viewport').append(layer); } return layer; }
function clearHandles() { handleLayer().innerHTML = ''; }
function handle(x, y, role, index = '') { return `<circle class="resize-handle" data-role="${role}" data-index="${index}" cx="${x}" cy="${y}" r="${9/scale}"/>`; }

    clearHandles(); if (!el) return;
    const tag = el.tagName.toLowerCase(), pose = el.getAttribute('transform') || '', box = el.getBBox();
    let marks = '', unrotatedMarks = '';

        initialTop: parseFloat(float.style.top) || 0
    };
    floatBar.setPointerCapture(e.pointerId);
    e.preventDefault();
});
floatBar.addEventListener('pointermove', e => {
    if (floatDrag) {
        const float = $('floating');
        float.style.left = (floatDrag.initialLeft + e.clientX - floatDrag.startX) + 'px';
        float.style.top = (floatDrag.initialTop + e.clientY - floatDrag.startY) + 'px';
        float.dataset.moved = 'true';
    }
});
floatBar.addEventListener('pointerup', e => {
    if (floatDrag) {
        floatBar.releasePointerCapture(e.pointerId);
        floatDrag = null;
    }
});

</script></body></html>
